server:
  port: 8081

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3307/boot-base?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=UTC&useSSL=false
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: root
    password: 123456
  jpa:
    show-sql: true
    database: mysql
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: update
      naming:
        #指定jpa的自动表生成策略，驼峰自动映射为下划线格式7
        implicit-strategy: org.hibernate.boot.model.naming.ImplicitNamingStrategyLegacyJpaImpl
        #physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
  data:
    redis:
      password: 123456

security:
  ignore:
    whites:
      - /sys/user/login
      - /sys/user/logout
      - /sys/user/register
      - /captchaImage
      - /favicon.ico
      - /doc.html
      - /webjars/**
      - /swagger-resources/**
      - /v2/api-docs/**
sa-token:
  # token名称 (同时也是cookie名称)
  token-name: Authorization
  # token有效期 设为7天 (必定过期) 单位: 秒
  timeout: 604800
  # token临时有效期 (指定时间无操作就过期) 单位: 秒
  active-timeout: 604800
  # 是否允许同一账号并发登录 (为true时允许一起登录, 为false时新登录挤掉旧登录)
  is-concurrent: true
  # 在多人登录同一账号时，是否共用一个token (为true时所有登录共用一个token, 为false时每次登录新建一个token)
  is-share: false
  # 是否尝试从header里读取token
  is-read-header: true
  # 是否尝试从cookie里读取token
  is-read-cookie: false
  # token前缀
  token-prefix: "Bearer"
  # jwt秘钥
  jwt-secret-key: abcdefghijklmnopqrstuvwxyz
redisson:
  # redis key前缀
  keyPrefix:
  # 线程池数量
  threads: 16
  # Netty线程池数量
  nettyThreads: 32
  # 单节点配置
  singleServerConfig:
    # 客户端名称
    clientName: boot-base
    # 最小空闲连接数
    connectionMinimumIdleSize: 32
    # 连接池大小
    connectionPoolSize: 64
    # 连接空闲超时，单位：毫秒
    idleConnectionTimeout: 10000
    # 命令等待超时，单位：毫秒
    timeout: 3000
    # 发布和订阅连接池大小
    subscriptionConnectionPoolSize: 50
# 方式1：推荐 - 打印完整 SQL + 参数绑定值（最清晰）
logging:
  level:
    # MyBatis-Plus 核心包，控制 SQL 输出
    com.baomidou.mybatisplus: DEBUG
    # 你的 Mapper 接口所在包（替换成你实际的包名，例如 com.liyuxiang.mapper）
    com.liyuxiang.mapper: DEBUG   # ← 关键！必须把你自己的 mapper 包设为 DEBUG

    # 可选：如果想更详细（看到 ? 参数的真实值）
    org.apache.ibatis: DEBUG